name: libmipc CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  check:
    name: ${{ matrix.check }}
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        check: [test, discovery, security, stress, sandbox]
    
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main

      - name: Run ${{ matrix.check }}
        run: nix build .#checks.aarch64-darwin.${{ matrix.check }} --impure
